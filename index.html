<style>
  :root{--bg:#ffffff;--ink:#0b0b0f;--muted:#6a6a72;--hair:#ececef;--accent:#4d4dff;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Instrument Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .shell{max-width:1180px;margin:0 auto;padding:0 clamp(20px,4vw,56px);min-height:100%;display:flex;flex-direction:column}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:26px 0}
  .brand{font-family:"Quicksand",sans-serif;font-weight:400;font-size:16px;letter-spacing:.38em}
  .nav-link{font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);text-decoration:none;padding:8px 4px;transition:color .25s ease}
  .nav-link:hover{color:var(--muted)}
  .nav-link:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:clamp(44px,7.5vh,92px) 0 40px}
  .headline{font-size:clamp(1.15rem,4.4vw,3.4rem);line-height:1.05;letter-spacing:-.03em;font-weight:500;white-space:nowrap;margin-bottom:20px}
  .headline .grad{background:linear-gradient(120deg,#6f70ff 0%,#4d4dff 55%,#3a3ad9 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  .stage{position:relative;width:100%;height:min(46vh,380px);margin:18px 0 30px}
  .stage canvas{display:block;width:100%;height:100%}
  .sub{font-size:clamp(0.52rem,1.95vw,1.22rem);line-height:1.6;letter-spacing:.01em;color:#2f3037;white-space:nowrap;margin-bottom:8px}
  .cta{display:inline-flex;align-items:center;gap:11px;background:var(--ink);color:#fff;font-size:15px;font-weight:500;text-decoration:none;padding:15px 28px;border-radius:100px;transition:transform .3s cubic-bezier(.2,.7,.2,1),background .3s ease}
  .cta .arrow{transition:transform .3s cubic-bezier(.2,.7,.2,1)}
  .cta:hover{background:var(--accent);transform:translateY(-2px)}
  .cta:hover .arrow{transform:translateX(4px)}
  .cta:focus-visible{outline:2px solid var(--accent);outline-offset:4px}
  .foot{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:26px 0 30px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.06em;color:var(--muted)}
  .foot a{color:var(--muted);text-decoration:none}.foot a:hover{color:var(--ink)}
  .foot .col span{display:block;line-height:1.9}
  .foot .brandline{color:var(--ink);letter-spacing:.18em}
  .rise{opacity:0;transform:translateY(14px);animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards}
  .d1{animation-delay:.05s}.d2{animation-delay:.28s}.d3{animation-delay:.4s}
  @keyframes rise{to{opacity:1;transform:none}}
  .stage{opacity:0;animation:fade 1.4s ease .2s forwards}
  @keyframes fade{to{opacity:1}}
  @media (max-width:900px){.stage{height:36vh}}
  @media (prefers-reduced-motion:reduce){.rise,.stage{animation:none;opacity:1;transform:none}}

<body>
  <div class="shell">
    <header class="nav"><div class="brand">neuron</div><a class="nav-link" href="mailto:contact@neuroncompany.co">Contact</a></header>
    <main class="hero">
      <h1 class="headline rise d1">The biological compute layer for AI.</h1>
      <p class="sub rise d2">Neuron is turning living neural networks into reliable, scalable computing infrastructure.</p>
      <div class="stage" id="stage" aria-hidden="true"><canvas id="c"></canvas></div>
    </main>
    <footer class="foot">
      <div class="col"><span><a href="mailto:contact@neuroncompany.co">contact@neuroncompany.co</a></span></div>
      <div class="col" style="text-align:right"><span>© 2026 Neuron Company Inc.</span></div>
    </footer>
  </div>

<script>
(function(){
  var REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var stage=document.getElementById('stage'); var canvas=document.getElementById('c');
  if(!canvas||!stage) return;
  var ctx=canvas.getContext('2d');
  var W=0,H=0,DPR=1;
  var CH=44;             // channels
  var pad=0;
  var spikes=[];         // {ch, x, a}
  var window_s=6;        // seconds visible
  var burstCd=2.2;
  var T=0;

  // Meta-style hue: blue -> purple -> pink, looping
  function metaCol(p){ var hue=270+62*Math.sin(p); return 'hsl('+hue.toFixed(1)+',92%,63%)'; }

  function fit(){DPR=Math.min(window.devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);pad=Math.min(W,H)*0.05;}

  function rowY(ch){var plotH=H-pad*2;return pad+ch/(CH-1)*plotH;}

  function spawn(ch,burst){spikes.push({ch:ch,x:W-pad,a:1});}

  function step(dt){
    var plotW=W-pad*2;
    var speed=plotW/window_s;
    // move
    for(var i=spikes.length-1;i>=0;i--){spikes[i].x-=speed*dt; if(spikes[i].x<pad-2) spikes.splice(i,1);}
    // background firing (Poisson-ish)
    for(var ch=0;ch<CH;ch++){ if(Math.random()< dt*1.4) spawn(ch,false); }
    // network bursts: many channels fire together
    burstCd-=dt;
    if(burstCd<=0){ burstCd=1.8+Math.random()*2.2; var frac=0.45+Math.random()*0.35; for(var ch=0;ch<CH;ch++){ if(Math.random()<frac) spawn(ch,true); } }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    var plotW=W-pad*2, plotH=H-pad*2;
    var gap=plotH/(CH-1);
    var th=Math.max(3, gap*0.62);   // tick height
    // faint channel guides
    ctx.strokeStyle='rgba(11,11,15,0.035)'; ctx.lineWidth=1;
    for(var ch=0;ch<CH;ch+=1){var y=rowY(ch);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();}
    // spikes
    for(var i=0;i<spikes.length;i++){
      var sp=spikes[i]; var y=rowY(sp.ch);
      var age=(sp.x-pad)/plotW;        // 1 = newest (right), 0 = oldest (left)
      // grey when old -> ink -> accent when very recent
      var col;
      if(age>0.88){var k=(age-0.88)/0.12;col='rgba('+Math.round(30+47*k)+','+Math.round(31+46*k)+','+Math.round(39+216*k)+',0.95)';}
      else {var g=0.28+0.55*age; col='rgba(20,21,27,'+g+')';}
      ctx.strokeStyle=col; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(sp.x,y-th/2); ctx.lineTo(sp.x,y+th/2); ctx.stroke();
    }
    // now line — Meta-style shifting gradient
    var nx=W-pad, ny0=pad-4, ny1=H-pad+4;
    var mg=ctx.createLinearGradient(nx,ny0,nx,ny1);
    mg.addColorStop(0, metaCol(T*0.8));
    mg.addColorStop(0.5, metaCol(T*0.8+1.3));
    mg.addColorStop(1, metaCol(T*0.8+2.6));
    ctx.save(); ctx.shadowColor=metaCol(T*0.8+1.3); ctx.shadowBlur=1.5;
    ctx.strokeStyle=mg; ctx.lineWidth=2.0;
    ctx.beginPath(); ctx.moveTo(nx,ny0); ctx.lineTo(nx,ny1); ctx.stroke();
    ctx.restore();
  }

  var lastTime=0;
  function loop(ts){requestAnimationFrame(loop);var now=ts?ts/1000:0;var dt=lastTime?Math.min(now-lastTime,0.05):0.016;lastTime=now;T=now;if(!REDUCED)step(dt);draw();}
  function init(){fit(); if(REDUCED){var plotW=W-pad*2;for(var k=0;k<900;k++){spikes.push({ch:(Math.random()*CH)|0,x:pad+Math.random()*plotW,a:1});}draw();}}
  window.addEventListener('resize',function(){fit();draw();});
  init(); requestAnimationFrame(loop);
})();
</script>
